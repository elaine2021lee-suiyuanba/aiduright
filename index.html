<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiduRight - Find Benefits You Qualify For</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>AiduRight</h1>
        <p class="tagline">Find government benefits you qualify for</p>
    </header>

    <main>
        <section id="intro" class="screen active">
            <h2>Get matched to benefits in minutes</h2>
            <p>Answer a few simple questions. We'll show you all the programs you may qualify for.</p>
            <button id="start-btn" class="btn-primary">Get Started</button>
        </section>

        <section id="questionnaire" class="screen">
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div id="question-container">
                <!-- Questions will be loaded here by JS -->
            </div>
            <div class="nav-buttons">
                <button id="back-btn" class="btn-secondary">Back</button>
                <button id="next-btn" class="btn-primary">Next</button>
            </div>
        </section>

        <section id="loading" class="screen">
            <p>Finding your benefits...</p>
        </section>

        <section id="results" class="screen">
            <!-- Results will be loaded here by JS -->
        </section>
    </main>

    <footer>
        <p>AiduRight is for informational purposes only. Not official eligibility determination.</p>
    </footer>

    <script src="benefits.js"></script>
    <script src="app.js"></script>
</body>
</html>
